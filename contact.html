<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Projects</title>
        <link rel="stylesheet" href="contact.css">
    </head>
    <body>
        <div class="background"> 
            <div class="container">
              <div class="screen">
                <div class="screen-header">
                  <div class="screen-header-left">
                    <div class="screen-header-button close"></div>
                    <div class="screen-header-button maximize"></div>
                    <div class="screen-header-button minimize"></div>
                  </div>
                </div>
                <div class="screen-body">
                  <div class="screen-body-item left">
                    <div class="app-title">
                      <span>CONTACT</span>
                      <span>US</span>
                    </div>
                    <div class="app-contact"></div>
                  </div>
                  <!-- Form section -->
                  <div class="screen-body-item">
                    <form onsubmit="sendEmail();test(); reset(); return false;" class="app-form">
                      <div class="app-form-group">
                        <input id="name" class="app-form-control" placeholder="NAME" >
                      </div>
                      <div id="email" class="app-form-group">
                        <input class="app-form-control" placeholder="EMAIL">
                      </div>
                      <div class="app-form-group message">
                        <input id="message" class="app-form-control" placeholder="MESSAGE">
                      </div>
                      <div class="app-form-group buttons">
                        <button id="send" type="submit" class="app-form-button">SEND</button>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
              </div>
            </div>
            <nav>
                <a href="index.html">Home</a>
                <a href="project.html">Projects</a>
              </nav>
          </div> 
          <script src="https://smtpjs.com/v3/smtp.js"></script>
          <script>
              //testing if the form is working
              function test(){
                console.log(document.getElementById("name").value);
              }
              //function that send mail using elastic smtp servies
              function sendEmail(){
                Email.send({
                SecureToken : "5fdd82af-2199-488d-88e5-40f843b291eb",
                To : 'lilesh3016@gmail.com',
                From : 'lilesh3016@gmail.com',
                Subject : "Contact enquiry from portoflio",
                Body : "From : "+document.getElementById("name").value+"<br> Eamil: "+document.getElementById("email").value+"<br> Message:"+document.getElementById("message").value
              }).then(
                message => alert(message)
              );
              }
            </script>
    </body>
</html>
